<svg width="100%" height="100%" viewBox="0 0 1600 900" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="1600" height="900" fill="#0B0E23" />

  <defs>
    <filter id="purpleGlowOuter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feFlood flood-color="#8A2BE2" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="purpleGlowAccent" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#8A2BE2" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .kpi-title { font-family: 'SF Pro Display', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #FFFFFF; }
    .kpi-value { font-family: 'SF Pro Display', Arial, sans-serif; font-size: 56px; font-weight: 900; fill: #FFFFFF; }
    .kpi-unit { font-family: 'SF Pro Display', Arial, sans-serif; font-size: 20px; font-weight: normal; fill: #888888; }
    .chart-label { font-family: Arial, sans-serif; font-size: 14px; fill: #666666; }
  </style>

  <g transform="translate(100, 100)" filter="url(#purpleGlowOuter)" opacity="0.95">
    
    <text x="0" y="30" class="kpi-title" font-size="32px">ANALYTICS INSIGHTS</text>
    <text x="0" y="60" class="kpi-unit">PERFORMANCE OVERVIEW — 7 DAY TRENDS</text>
    
    <g transform="translate(0, 120)">
      <rect width="400" height="200" rx="16" fill="#141933" />
      <text x="30" y="50" class="kpi-title">TOTAL IMPRESSIONS</text>
      <text x="30" y="130" class="kpi-value">1.2M</text>
      <path d="M30 160 C 80 140, 130 180, 180 140 S 230 100, 280 120" stroke="#8A2BE2" stroke-width="3" fill="none" filter="url(#purpleGlowAccent)"/>
    </g>
    
    <g transform="translate(450, 120)">
      <rect width="400" height="200" rx="16" fill="#141933" />
      <text x="30" y="50" class="kpi-title">CONVERSION RATE</text>
      <text x="30" y="130" class="kpi-value">6.8%</text>
      <rect x="30" y="160" width="340" height="10" rx="5" fill="#2D3762"/>
      <rect x="30" y="160" width="230" height="10" rx="5" fill="#8A2BE2" filter="url(#purpleGlowAccent)"/>
    </g>
    
    <g transform="translate(0, 370)">
      <rect width="1400" height="400" rx="20" fill="#141933" />
      <text x="40" y="60" class="kpi-title">REVENUE PERFORMANCE TREND</text>
      
      <g transform="translate(1360, 100)" text-anchor="end">
        <text x="0" y="0" class="chart-label">50k</text>
        <text x="0" y="60" class="chart-label">40k</text>
        <text x="0" y="120" class="chart-label">30k</text>
        <text x="0" y="180" class="chart-label">20k</text>
        <text x="0" y="240" class="chart-label">10k</text>
      </g>
      
      <g stroke="#2D3762" stroke-dasharray="8 8" opacity="0.5">
        <line x1="80" y1="100" x2="1320" y2="100" />
        <line x1="80" y1="160" x2="1320" y2="160" />
        <line x1="80" y1="220" x2="1320" y2="220" />
        <line x1="80" y1="280" x2="1320" y2="280" />
        <line x1="80" y1="340" x2="1320" y2="340" stroke-dasharray="0" /> </g>
      
      <g transform="translate(80, 360)">
        <text x="0" y="10" class="chart-label">MON</text>
        <text x="207" y="10" class="chart-label">TUE</text>
        <text x="414" y="10" class="chart-label">WED</text>
        <text x="621" y="10" class="chart-label">THU</text>
        <text x="828" y="10" class="chart-label">FRI</text>
        <text x="1035" y="10" class="chart-label">SAT</text>
        <text x="1242" y="10" class="chart-label">SUN</text>
      </g>
      
      <g transform="translate(80, 340)">
        <path d="M0 -60 C 150 -100, 300 -180, 450 -120 S 600 -240, 750 -200 S 900 -140, 1050 -180 S 1200 -260, 1350 -220 V 0 H 0 Z" fill="#8A2BE2" opacity="0.05"/>
        
        <path d="M0 -60 C 150 -100, 300 -180, 450 -120 S 600 -240, 750 -200 S 900 -140, 1050 -180 S 1200 -260, 1350 -220" stroke="#8A2BE2" stroke-width="4" fill="none" filter="url(#purpleGlowAccent)"/>
        
        <path d="M0 -40 C 150 -80, 300 -120, 450 -100 S 600 -180, 750 -140 S 900 -100, 1050 -120 S 1200 -180, 1350 -160" stroke="#00FFCC" stroke-width="2" fill="none" opacity="0.6"/>
      </g>
    </g>
    
    <g transform="translate(900, 120)">
      <rect width="500" height="200" rx="16" fill="#141933" />
      <text x="30" y="50" class="kpi-title">DAILY METRICS</text>
      
      <g transform="translate(30, 80)">
        <rect x="0" y="0" width="10" height="100" rx="5" fill="#2D3762"/>
        <rect x="0" y="40" width="10" height="60" rx="5" fill="#8A2BE2" filter="url(#purpleGlowAccent)"/>
        
        <rect x="40" y="0" width="10" height="100" rx="5" fill="#2D3762"/>
        <rect x="40" y="20" width="10" height="80" rx="5" fill="#8A2BE2" filter="url(#purpleGlowAccent)"/>
        
        <rect x="80" y="0" width="10" height="100" rx="5" fill="#2D3762"/>
        <rect x="80" y="10" width="10" height="90" rx="5" fill="#00FFCC" />
        
        <rect x="120" y="0" width="10" height="100" rx="5" fill="#2D3762"/>
        <rect x="120" y="30" width="10" height="70" rx="5" fill="#8A2BE2" filter="url(#purpleGlowAccent)"/>
      </g>
    </g>
  </g>
</svg>